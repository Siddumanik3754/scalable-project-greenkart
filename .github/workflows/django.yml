name: Flask DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  prebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget

      - name: Install Java 17
        run: |
          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb
          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb
          java -version

  deploy:
    runs-on: ubuntu-latest
    needs: prebuild

    steps:
      - name: Download Deployment Package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: Eb-scalable-x23289678
          environment_name: Eb-scalable-x23289678-env
          region: us-east-1
          version_label: "flask-build-${{ github.run_number }}"
          deployment_package: deploy.zip
          wait_for_deployment: false
